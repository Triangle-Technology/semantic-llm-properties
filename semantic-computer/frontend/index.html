<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Computer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Semantic Computer</h1>
      <p class="subtitle">Compose semantic primitives to compute meaning</p>
    </header>

    <!-- Pipeline Builder -->
    <section class="pipeline-builder">
      <div class="pipeline-header">
        <span>Pipeline</span>
        <button id="reset-btn" class="reset-btn" title="Reset to default DISSOLVE order">Reset</button>
      </div>
      <div class="pipeline" id="pipeline">
        <!-- Filled by JS — draggable primitive chips -->
      </div>
      <div class="pipeline-bank" id="pipeline-bank">
        <!-- Removed primitives go here -->
      </div>
      <p class="pipeline-hint" id="pipeline-hint"></p>
    </section>

    <!-- Dynamic Input -->
    <section class="input-section" id="input-section">
      <!-- Changes based on first primitive in pipeline -->
    </section>

    <!-- API Keys (collapsible) -->
    <details class="api-keys">
      <summary>API Keys <span class="hint">(stored in browser only)</span></summary>
      <div class="key-row">
        <label>Claude <span class="type-badge type-m-strong">Type-M</span></label>
        <input type="password" id="key-anthropic" placeholder="sk-ant-..." />
      </div>
      <div class="key-row">
        <label>GPT <span class="type-badge type-d">Type-D</span></label>
        <input type="password" id="key-openai" placeholder="sk-..." />
      </div>
      <div class="key-row">
        <label>Gemini <span class="type-badge type-m-mod">Type-M mod</span></label>
        <input type="password" id="key-google" placeholder="AIza..." />
      </div>
      <div id="routing-info" class="routing-info"></div>
    </details>

    <!-- Compute -->
    <div class="compute-row">
      <button id="compute-btn" class="compute-btn">⚡ Compute</button>
      <label class="contribute-label">
        <input type="checkbox" id="contribute-check" checked />
        Share for research <span class="hint">(anonymous)</span>
      </label>
    </div>

    <!-- Results -->
    <section class="results hidden" id="results">
      <div class="steps-progress" id="steps-progress"></div>
      <div class="result-content" id="result-content"></div>
      <div class="model-insight" id="model-insight"></div>
    </section>
  </div>

  <footer>
    <p>Based on <a href="https://github.com/Triangle-Technology/semantic-llm-properties" target="_blank">25 experiments, ~7,500 API calls, 3 model families</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
