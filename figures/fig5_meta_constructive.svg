n</text>  <text x="515" y="382" font-size="12" text-anchor="middle" font-weight="normal" fill="#333">Markers</text>  <line x1="50" y1="256.0869565217391" x2="360" y2="256.0869565217391" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4,3"/>  <text x="365" y="260.0869565217391" font-size="10" text-anchor="start" font-weight="normal" fill="#d32f2f">1.0x</text>  <rect x="440" y="55" width="235" height="110" fill="white" stroke="#ddd" rx="4"/>  <rect x="450" y="65" width="14" height="14" fill="#7c3aed" rx="2"/>  <text x="470" y="77" font-size="11" text-anchor="start" font-weight="normal" fill="#333">Claude — Type-M (strong)</text>  <rect x="450" y="87" width="14" height="14" fill="#ea580c" rx="2"/>  <text x="470" y="99" font-size="11" text-anchor="start" font-weight="normal" fill="#333">Gemini — Type-M (moderate)</text>  <rect x="450" y="109" width="14" height="14" fill="#059669" rx="2"/>  <text x="470" y="121" font-size="11" text-anchor="start" font-weight="normal" fill="#333">GPT — Type-D (destructive)</text>  <text x="558" y="142" font-size="10" text-anchor="middle" font-weight="normal" fill="#666">vocab ↑ + contradiction ↑ = Type-M</text>  <text x="558" y="156" font-size="10" text-anchor="middle" font-weight="normal" fill="#666">vocab ↓ + contradiction 0 = Type-D</text>
